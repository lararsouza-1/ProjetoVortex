<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>
    <link rel="stylesheet" href="Css/style3.css">
</head>

<body>

    <header>
        <div class="logo">
            <img src="***" alt="logo">
        </div>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="produtos.html">Produtos</a>
            <a class="active">Clientes</a>
            <a href="estoque.html">Estoque</a>
            <a href="vendas.html">Vendas</a>
            <a href="financeiro.html">Financeiro</a>
        </nav>
    </header>

    <main class="container">

        <div class="titulo-area">

            <div>
                <h1>Clientes</h1>
                <p>Gerencie sua Base de Clientes</p>
            </div>

            <button id="btnNovo">
                + Novo Cliente
            </button>

        </div>

        <!-- CARDS -->
        <section class="cards">

            <div class="card">
                <h3>Total de Clientes</h3>
                <span id="totalClientes">0</span>
            </div>

            <div class="card">
                <h3>Clientes Ativos</h3>
                <span class="ativo-numero" id="clientesAtivos">0</span>
            </div>

            <div class="card">
                <h3>PF / PJ</h3>
                <span id="pfpj">0 / 0</span>
            </div>

        </section>

        <!-- LISTA -->
        <section class="lista-clientes">

            <h2>Lista de Clientes</h2>

            <div class="busca">
                <i class="fa-solid fa-magnifying-glass"></i>

                <input type="text" id="pesquisa" placeholder="Buscar Cliente por nome, e-mail, CPF/CNPJ...">
            </div>

            <table>

                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Tipo</th>
                        <th>CPF/CNPJ</th>
                        <th>Contato</th>
                        <th>Localização</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="tabelaClientes">

                </tbody>

            </table>

        </section>

    </main>

    <!-- MODAL -->
    <div class="modal" id="modal">

        <div class="modal-box">

            <h2>Novo Cliente</h2>

            <input type="text" id="nome" placeholder="Nome">

            <input type="email" id="email" placeholder="E-mail">

            <select id="tipo" aria-label="Tipo de cliente">
                <option value="PF">PF</option>
                <option value="PJ">PJ</option>
            </select>

            <input type="text" id="cpf" placeholder="CPF/CNPJ">

            <input type="text" id="telefone" placeholder="Telefone">

            <input type="text" id="cidade" placeholder="Cidade">

            <select id="status" aria-label="Status do cliente">
                <option value="Ativo">Ativo</option>
                <option value="Inativo">Inativo</option>
            </select>

            <div class="botoes-modal">
                <button class="cancelar" id="fecharModal">
                    Cancelar
                </button>

                <button class="salvar" id="salvarCliente">
                    Salvar
                </button>
            </div>

        </div>

    </div>

</body>

</html>
