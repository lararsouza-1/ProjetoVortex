<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>
    <link rel="stylesheet" href="Css/style3.css">
</head>

<body>

    <header>
        <div class="logo">
            <img src="***" alt="logo">
        </div>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="produtos.html">Produtos</a>
            <a class="active">Clientes</a>
            <a href="estoque.html">Estoque</a>
            <a href="vendas.html">Vendas</a>
            <a href="financeiro.html">Financeiro</a>
        </nav>
    </header>

    <main>
        <div class="topo">
            <div>
                <h1>Clientes</h1>
                <p class="sub">Gerencie sua lista de clientes</p>
            </div>

            <button onclick="abrirCadastro()">+ Novo Cliente</button>
        </div>

        <section class="cards">
            <div class="card card-azul">
                <h3>Total de Clientes</h3>
                <p class="number" id="totalClientes">0</p>
            </div>

            <div class="card card-azul">
                <h3>Clientes Ativos</h3>
                <p class="number" id="ativos">0</p>
            </div>

            <div class="card card-azul">
                <h3>PF / PJ</h3>
                <p class="number" id="pessoas">0 / 0</p>
            </div>

        </section>

        <section class="box">
            <h3>Lista de Clientes</h3>

            <div class="filtros">
                <input type="text" id="busca" placeholder="Buscar Cliente por nome, e-mail, CPF/CNPJ..."
                    onkeyup="filtrar()">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Tipo</th>
                        <th>CPF/CNPJ</th>
                        <th>Contato</th>
                        <th>Endereço</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaClientes"></tbody>
            </table>
        </section>
    </main>

    <div id="modalCliente" class="modal">
        <div class="modal-content">
            <span class="fechar" onclick="fecharModal()">×</span>

            <h2>Adicionar Novo Cliente</h2>
            <p class="sub">Preencha as informações</p>

            <div class="form-grid">
                <div>
                    <label for="tipo">Tipo</label>
                    <select id="tipo">
                        <option value="pf" selected>Pessoa Física</option>
                        <option value="pj">Pessoa Jurídica</option>
                    </select>
                </div>
                <div>
                    <label for="nome">Nome/Razão Social</label>
                    <input type="text" id="nome" placeholder="Digite o nome completo ou a razão social">
                </div>

                <div>
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="Digite o e-mail">
                </div>

                <div class="full">
                    <label for="telefone">Telefone</label>
                    <input type="text" id="telefone" placeholder="Digite o telefone">
                </div>

                <div>
                    <label for="cpfCnpj">CPF/CNPJ</label>
                    <input type="text" id="cpfCnpj" placeholder="Digite o CPF ou CNPJ">
                </div>

                <div>
                    <label for="endereco">Endereço</label>
                    <input type="text" id="endereco" placeholder="Digite o endereço">
                </div>

                <div>
                    <label for="cidade">Cidade</label>
                    <input type="text" id="cidade" placeholder="Digite a cidade">
                </div>

                <div>
                    <label for="estado">Estado</label>
                    <input type="text" id="estado" placeholder="Digite o estado">
                </div>

            </div>

            <div class="acoes">
                <button class="cancelar" onclick="fecharModal()">Cancelar</button>
                <button onclick="salvarCliente()">Adicionar</button>
            </div>
        </div>
    </div>
    <script src="Js/clien.js"></script>
</body>

</html>
