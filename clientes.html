<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>
    <link rel="stylesheet" href="Css/style3.css">
</head>

<body>

    <header>
        <div class="logo">
            <img src="***" alt="logo">
        </div>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="produtos.html">Produtos</a>
            <a class="active">Clientes</a>
            <a href="estoque.html">Estoque</a>
            <a href="vendas.html">Vendas</a>
            <a href="financeiro.html">Financeiro</a>
        </nav>
    </header>

    <section class="cards">
        <div class="card">
            <h3>Total de Clientes</h3>
            <p id="totalClientes">0</p>
        </div>

        <div class="card">
            <h3>Clientes Ativos</h3>
            <p id="clientesAtivos">0</p>
        </div>

        <div class="card destaque">
            <h3>PF / PJ</h3>
            <p id="pfpj">0 / 0</p>
        </div>
    </section>

    <section class="lista">
        <input type="text" id="busca" placeholder="Buscar cliente..." onkeyup="filtrarClientes()">

        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Tipo</th>
                    <th>CPF/CNPJ</th>
                    <th>Contato</th>
                    <th>Cidade</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaClientes"></tbody>
        </table>
    </section>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2>Novo Cliente</h2>

            <label for="tipo">Tipo</label>
            <select id="tipo" title="Tipo de cliente">
                <option>PF</option>
                <option>PJ</option>
            </select>

            <input type="text" id="nome" placeholder="Nome / Razão Social">
            <input type="email" id="email" placeholder="E-mail">
            <input type="number" id="telefone" placeholder="Telefone">
            <input type="text" id="documento" placeholder="CPF/CNPJ">
            <input type="text" id="cidade" placeholder="Cidade">

            <select id="status" title="Status do cliente">
                <option>Ativo</option>
                <option>Inativo</option>
            </select>

            <div class="acoes-modal">
                <button onclick="fecharModal()">Cancelar</button>
                <button onclick="adicionarCliente()">Adicionar</button>
            </div>
        </div>
    </div>

</body>

</html>
